name: README에 성경구절 업데이트

on:
  schedule:
    - cron: "*/6 * * * *" # 6분 마다 반복
  workflow_dispatch:

permissions:
  contents: write

# 글로벌 환경 변수 설정: Node.js 20 지원 중단 대응
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-bible-verse:
    runs-on: ubuntu-latest

    steps:
      - name: 리포지토리 체크아웃
        uses: actions/checkout@v4 # 최신 안정 버전 유지

      - name: Python 설치
        uses: actions/setup-python@v5 # Node.js 24 환경에서 실행되도록 env에 의해 강제됨
        with:
          python-version: "3.13"

      - name: README.md용 성경 구절 생성
        run: |
          import pickle
          import random
          import datetime

          # 현재 시간 (한국 기준)
          now = datetime.datetime.now(datetime.timezone(datetime.timedelta(hours=9)))
          today = now.strftime("%Y-%m-%d %H:%M:%S KST")

          # Pickle에서 구절 불러오기
          try:
              with open(".github/bible_verses.pkl", "rb") as f:
                  verses = pickle.load(f)
              
              verse = random.choice(verses)
              ref = verse["reference"]
              text = verse["verse"]

              # 삽입할 텍스트 구성
              new_content = f"\n📖 **{ref}**\n> {text}\n\n🕊️ _업데이트 시각: {today}_\n"

              # README.md 수정
              with open("README.md", "r", encoding="utf-8") as f:
                  content = f.read()

              import re
              # 정규표현식으로 주석 사이 내용 교체
              updated = re.sub(r".*?", new_content, content, flags=re.DOTALL)

              with open("README.md", "w", encoding="utf-8") as f:
                  f.write(updated)
          except FileNotFoundError:
              print("파일을 찾을 수 없습니다. 경로를 확인해주세요.")
        shell: python

      - name: Git 설정
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 변경 사항 커밋 및 푸시
        run: |
          git add README.md
          if git diff --staged --quiet; then
            echo "변경 사항 없음"
          else
            git commit -m "📖 README 성경 구절 자동 업데이트"
            git push
          fi
